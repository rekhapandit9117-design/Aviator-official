<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #050508;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        /* Ambient Crimson Glow to match the logo */
        .bg-glow {
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(230, 30, 37, 0.25) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            filter: blur(40px);
        }

        /* Splash Screen Container */
        .splash-container {
            position: relative;
            z-index: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        /* Logo Box adjusted for the wide aspect ratio of the Aviator Logo */
        .logo-box {
            position: relative;
            width: 100%;
            max-width: 380px; /* Perfect desktop width */
            display: flex;
            justify-content: center;
            align-items: center;
            animation: pulse 2.5s infinite ease-in-out;
        }

        .logo-box img {
            width: 100%;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 10px 25px rgba(230, 30, 37, 0.4));
        }

        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 10px 25px rgba(230, 30, 37, 0.3)); }
            50% { transform: scale(1.03); filter: drop-shadow(0 15px 40px rgba(230, 30, 37, 0.6)); }
            100% { transform: scale(1); filter: drop-shadow(0 10px 25px rgba(230, 30, 37, 0.3)); }
        }

        /* Modern Premium Minimal Loader */
        .loader-bar-container {
            width: 180px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .loader-bar {
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, #e61e25, #ff4d52);
            border-radius: 10px;
            position: absolute;
            animation: loadingMove 1.5s infinite ease-in-out;
            box-shadow: 0 0 10px #e61e25;
        }

        @keyframes loadingMove {
            0% { left: -40%; width: 30%; }
            50% { width: 40%; }
            100% { left: 110%; width: 30%; }
        }

        /* Glassmorphism Premium Overlay Modal for No Internet */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 8, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 10;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        .premium-card {
            background: linear-gradient(135deg, rgba(25, 25, 30, 0.75) 0%, rgba(15, 15, 20, 0.9) 100%);
            border: 1px solid rgba(230, 30, 37, 0.3);
            padding: 45px 35px;
            border-radius: 28px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8),
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transform: translateY(30px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.show .premium-card {
            transform: translateY(0);
        }

        .card-icon {
            font-size: 55px;
            color: #e61e25;
            margin-bottom: 25px;
            text-shadow: 0 0 25px rgba(230, 30, 37, 0.5);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .premium-card h2 {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 14px;
            letter-spacing: 0.5px;
        }

        .premium-card p {
            color: #a0a0ab;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .btn-retry {
            background: linear-gradient(90deg, #e61e25 0%, #ff4d52 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(230, 30, 37, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .btn-retry:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(230, 30, 37, 0.6);
        }
        
        .btn-retry:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="splash-container">
        <div class="logo-box">
            <img src="logo.png" alt="Aviator Logo">
        </div>
        <div class="loader-bar-container">
            <div class="loader-bar"></div>
        </div>
    </div>

    <div class="modal-overlay" id="networkModal">
        <div class="premium-card">
            <div class="card-icon">
                <i class="fa-solid fa-wifi-slash"></i>
            </div>
            <h2>CONNECTION LOST</h2>
            <p>Please check your network settings. A stable internet connection is required to authenticate your profile.</p>
            <button class="btn-retry" id="retryBtn">
                <i class="fa-solid fa-rotate-right" style="margin-right: 8px;"></i> Retry Connection
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDrAocFm8fnX2hJg2TyKQbmNe65C8ta4OA",
            authDomain: "aviator-f562e.firebaseapp.com",
            databaseURL: "https://aviator-f562e-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aviator-f562e",
            storageBucket: "aviator-f562e.firebasestorage.app",
            messagingSenderId: "649327828612",
            appId: "1:649327828612:web:f599fb22598002b6016cd1",
            measurementId: "G-RHZ13ET692"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let loadingTimeout = null;

        function checkConnectionAndProceed() {
            const networkModal = document.getElementById('networkModal');

            // Clear any active transitions to prevent double routing
            if (loadingTimeout) {
                clearTimeout(loadingTimeout);
            }

            // Strictly check internet availability
            if (!navigator.onLine) {
                networkModal.classList.add('show');
                return; // Stop execution here completely
            }

            // If internet is back, hide modal
            networkModal.classList.remove('show');

            // 2.5-second cinematic delay to allow the loading animation to display cleanly
            loadingTimeout = setTimeout(() => {
                // Re-verify network right before talking to Firebase 
                if (!navigator.onLine) {
                    networkModal.classList.add('show');
                    return;
                }

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        window.location.href = "home/dashboard.html";
                    } else {
                        window.location.href = "login.html";
                    }
                });
            }, 2500); 
        }

        // Event Listeners
        window.addEventListener('DOMContentLoaded', checkConnectionAndProceed);
        
        window.addEventListener('offline', () => {
            if (loadingTimeout) clearTimeout(loadingTimeout);
            document.getElementById('networkModal').classList.add('show');
        });

        window.addEventListener('online', () => {
            checkConnectionAndProceed();
        });

        // Safe setup for the button click inside ES Module scope
        document.getElementById('retryBtn').addEventListener('click', checkConnectionAndProceed);
    </script>
</body>
</html>
