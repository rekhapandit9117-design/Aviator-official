<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Premium - Reset Key</title>
    <style>
        :root {
            --bg-dark: #0a0b10;
            --card-bg: rgba(22, 24, 37, 0.7);
            --aviator-red: #ff002b;
            --aviator-red-glow: rgba(255, 0, 43, 0.4);
            --text-main: #ffffff;
            --text-muted: #7e84a3;
            --border-color: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(10, 11, 16, 0.6);
            --success-green: #00e676;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cabinet Grotesk', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        /* Animated Grid Background */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg) translateY(-30%);
            animation: gridMove 20s linear infinite;
            z-index: 0;
            opacity: 0.7;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 800px; }
        }

        .glow-orb {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--aviator-red-glow) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            filter: blur(50px);
            opacity: 0.6;
        }

        /* Glassmorphism Card Container */
        .reset-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px) saturate(120%);
            -webkit-backdrop-filter: blur(16px) saturate(120%);
            width: 100%;
            max-width: 420px;
            padding: 45px 35px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            z-index: 1;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .brand-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-logo {
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-main);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .brand-logo span {
            color: var(--aviator-red);
            text-shadow: 0 0 20px var(--aviator-red);
        }

        .page-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 15px;
            letter-spacing: 0.5px;
        }

        .info-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-top: 10px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        /* Country Selector + Input Field Box */
        .phone-input-container {
            display: flex;
            gap: 10px;
        }

        .country-select {
            width: 95px;
            padding: 14px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.95rem;
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;
        }

        .country-select option {
            background-color: #161825;
            color: var(--text-main);
        }

        .form-input {
            width: 100%;
            padding: 14px 18px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .phone-input-container .form-input {
            flex: 1;
        }

        .form-input:focus, .country-select:focus {
            outline: none;
            border-color: var(--aviator-red);
            background: rgba(10, 11, 16, 0.9);
            box-shadow: 0 0 15px rgba(255, 0, 43, 0.15);
        }

        /* Premium Glowing Button */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--aviator-red);
            border: none;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--aviator-red-glow);
            margin-top: 10px;
            margin-bottom: 25px;
        }

        .submit-btn:hover {
            background: #ff1a40;
            box-shadow: 0 0 25px var(--aviator-red-glow);
            transform: translateY(-1px);
        }

        .submit-btn:disabled {
            background: #4a151d;
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
        }

        .status-box {
            background: rgba(0, 230, 118, 0.1);
            border: 1px solid var(--success-green);
            color: var(--success-green);
            padding: 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            line-height: 1.4;
            text-align: center;
            display: none;
            margin-bottom: 20px;
        }

        .status-box.error {
            background: rgba(255, 0, 43, 0.1);
            border-color: var(--aviator-red);
            color: var(--aviator-red);
        }

        .back-to-login {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .back-to-login a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.2s ease;
        }

        .back-to-login a:hover {
            color: var(--aviator-red);
        }
    </style>
</head>
<body>

    <div class="glow-orb"></div>

    <div class="reset-card">
        <div class="brand-section">
            <div class="brand-logo">Aviator <span>✈</span></div>
            <p class="page-title">Reset Password</p>
            <p class="info-text">Enter your details below to update your security passkey with management.</p>
        </div>

        <div class="status-box" id="statusDisplay"></div>

        <form id="resetForm">
            <!-- Phone Number Input Box Group -->
            <div class="form-group">
                <label for="phoneNumber">Registered Phone Number</label>
                <div class="phone-input-container">
                    <select id="countryCode" class="country-select">
                        <option value="+1">🇺🇸 +1</option>
                        <option value="+91" selected>🇮🇳 +91</option>
                        <option value="+44">🇬🇧 +44</option>
                        <option value="+234">🇳🇬 +234</option>
                    </select>
                    <input type="tel" id="phoneNumber" class="form-input" placeholder="9876543210" required autocomplete="tel">
                </div>
            </div>

            <!-- New Password Entry -->
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" class="form-input" placeholder="Min. 6 characters" required autocomplete="new-password">
            </div>

            <!-- Repeat Password Entry -->
            <div class="form-group">
                <label for="repeatPassword">Repeat Password</label>
                <input type="password" id="repeatPassword" class="form-input" placeholder="Confirm new password" required autocomplete="new-password">
            </div>

            <button type="submit" class="submit-btn" id="resetBtn">Request Reset</button>
        </form>

        <div class="back-to-login">
            Remembered your password? <a href="login.html">Back to Login</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

        // Keeps project ecosystem consistency intact 
        const firebaseConfig = {
            apiKey: "AIzaSyDrAocFm8fnX2hJg2TyKQbmNe65C8ta4OA",
            authDomain: "aviator-f562e.firebaseapp.com",
            databaseURL: "https://aviator-f562e-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aviator-f562e",
            storageBucket: "aviator-f562e.firebasestorage.app",
            messagingSenderId: "649327828612",
            appId: "1:649327828612:web:f599fb22598002b6016cd1",
            measurementId: "G-RHZ13ET692"
        };

        // Initialize App instance
        const app = initializeApp(firebaseConfig);

        const resetForm = document.getElementById('resetForm');
        const resetBtn = document.getElementById('resetBtn');
        const statusDisplay = document.getElementById('statusDisplay');

        resetForm.addEventListener('submit', (e) => {
            e.preventDefault();
            statusDisplay.style.display = 'none';
            statusDisplay.className = 'status-box';

            const countryCode = document.getElementById('countryCode').value;
            const rawPhone = document.getElementById('phoneNumber').value.trim();
            const fullNumber = countryCode + rawPhone;
            
            const newPassword = document.getElementById('newPassword').value;
            const repeatPassword = document.getElementById('repeatPassword').value;

            // Password match verification block
            if (newPassword !== repeatPassword) {
                statusDisplay.style.display = 'block';
                statusDisplay.classList.add('error');
                statusDisplay.innerText = "Passwords do not match.";
                return;
            }

            if (newPassword.length < 6) {
                statusDisplay.style.display = 'block';
                statusDisplay.classList.add('error');
                statusDisplay.innerText = "Password must be at least 6 characters.";
                return;
            }

            resetBtn.disabled = true;
            resetBtn.innerText = "Sending Ticket...";

            // Simulate high-tier account support request routing process
            setTimeout(() => {
                resetForm.style.display = 'none';
                statusDisplay.style.display = 'block';
                statusDisplay.innerHTML = `<strong>Reset Ticket Logged!</strong><br><br>Support request has been sent for ${fullNumber}. Please contact live chat or administration to complete verification and deploy your new password.`;
            }, 1200);
        });
    </script>
</body>
</html>
