<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator Premium - Login</title>
    <style>
        :root {
            --bg-dark: #0a0b10;
            --card-bg: rgba(22, 24, 37, 0.7);
            --aviator-red: #ff002b;
            --aviator-red-glow: rgba(255, 0, 43, 0.4);
            --text-main: #ffffff;
            --text-muted: #7e84a3;
            --border-color: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(10, 11, 16, 0.6);
            --success-green: #00e676;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cabinet Grotesk', 'Segoe UI', system-ui, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            overflow: hidden;
            position: relative;
            padding: 16px;
        }

        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            transform: perspective(500px) rotateX(60deg) translateY(-20%);
            animation: gridMove 20s linear infinite;
            z-index: 0;
            opacity: 0.6;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 600px; }
        }

        .glow-orb {
            position: absolute;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, var(--aviator-red-glow) 0%, transparent 70%);
            top: -100px;
            right: -50px;
            z-index: 0;
            pointer-events: none;
            filter: blur(50px);
            animation: pulseGlow 8s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0.8; }
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px) saturate(120%);
            -webkit-backdrop-filter: blur(16px) saturate(120%);
            width: 100%;
            max-width: 400px;
            padding: 24px 20px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            z-index: 1;
            position: relative;
        }

        .brand-section {
            text-align: center;
            margin-bottom: 22px;
            margin-top: 10px;
        }

        /* Camouflaged Secret Area: Looks normal, but behaves like an admin gateway */
        .brand-logo {
            font-size: 1.9rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-main);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: default;
            user-select: none;
        }

        .brand-logo span {
            color: var(--aviator-red);
            text-shadow: 0 0 15px var(--aviator-red);
            display: inline-block;
        }

        .brand-tagline {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .phone-input-container {
            display: flex;
            gap: 8px;
        }

        .country-select {
            width: 85px;
            padding: 12px 8px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .phone-input-container .form-input {
            flex: 1;
        }

        .form-input:focus, .country-select:focus {
            border-color: var(--aviator-red);
            background: rgba(10, 11, 16, 0.9);
            box-shadow: 0 0 10px rgba(255, 0, 43, 0.15);
        }

        .forgot-link-container {
            text-align: right;
            margin-top: -10px;
            margin-bottom: 16px;
        }

        .forgot-link-container a {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .forgot-link-container a:hover {
            color: var(--aviator-red);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--aviator-red);
            border: none;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            box-shadow: 0 4px 12px var(--aviator-red-glow);
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .submit-btn:active {
            transform: scale(0.98);
            background: #d60024;
        }

        .submit-btn:disabled {
            background: #4a151d;
            color: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
        }

        .status-message {
            font-size: 0.8rem;
            margin-top: 12px;
            text-align: center;
            display: none;
        }

        .status-message.error { color: var(--aviator-red); }
        .status-message.success { color: var(--success-green); }

        .register-prompt {
            text-align: center;
            margin-top: 22px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .register-prompt a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 700;
            margin-left: 4px;
            border-bottom: 1px solid var(--aviator-red);
            padding-bottom: 1px;
        }

        /* Stylish Camouflage Admin Overlay Popup */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 6, 10, 0.85);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .admin-modal {
            background: #11131e;
            border: 1px solid rgba(255, 0, 43, 0.25);
            box-shadow: 0 0 30px rgba(255, 0, 43, 0.2), inset 0 0 15px rgba(255, 255, 255, 0.02);
            width: 90%;
            max-width: 360px;
            padding: 24px;
            border-radius: 16px;
            transform: scale(0.9) translateY(20px);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-align: center;
        }

        .modal-overlay.active .admin-modal {
            transform: scale(1) translateY(0);
        }

        .modal-title {
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .modal-title span {
            color: var(--aviator-red);
            text-shadow: 0 0 10px var(--aviator-red-glow);
        }

        .modal-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }

        .modal-btn.cancel {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .modal-btn.cancel:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
        }

        .modal-btn.confirm {
            background: var(--aviator-red);
            color: var(--text-main);
            box-shadow: 0 4px 12px var(--aviator-red-glow);
        }

        @media (max-width: 360px) {
            .login-card { padding: 20px 14px; }
            .brand-logo { font-size: 1.7rem; }
        }
    </style>
</head>
<body>

    <div class="glow-orb"></div>

    <div class="login-card">
        <div class="brand-section">
            <div class="brand-logo" id="camouflageTrigger">Aviator <span>✈</span></div>
            <div class="brand-tagline">login</div>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="phoneNumber">Registered Mobile Number</label>
                <div class="phone-input-container">
                    <select id="countryCode" class="country-select">
                        <option value="+91" selected>🇮🇳 +91</option>
                        <option value="+1">🇺🇸 +1</option>
                        <option value="+44">🇬🇧 +44</option>
                    </select>
                    <input type="tel" id="phoneNumber" class="form-input" placeholder="Phone Number" required autocomplete="tel">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Account Password</label>
                <input type="password" id="password" class="form-input" placeholder="Enter Password" required autocomplete="current-password">
            </div>

            <div class="forgot-link-container">
                <a href="forget.html">Forgot Password?</a>
            </div>

            <button type="submit" class="submit-btn" id="loginBtn">login </button>
            <div class="status-message" id="statusDisplay"></div>
        </form>

        <div class="register-prompt">
            New account? <a href="register.html">Register Account</a>
        </div>
    </div>

    <div class="modal-overlay" id="adminModalOverlay">
        <div class="admin-modal">
            <div class="modal-title">Admin <span>System</span></div>
            <div class="modal-desc">Secure Authentication Matrix Required</div>
            <div class="form-group" style="text-align: left;">
                <label for="adminPasskey">Secure Passkey</label>
                <input type="password" id="adminPasskey" class="form-input" placeholder="••••••••" style="text-align: center; letter-spacing: 2px;">
                <div class="status-message error" id="adminErrorDisplay" style="margin-top: 8px;"></div>
            </div>
            <div class="modal-actions">
                <button type="button" class="modal-btn cancel" id="closeAdminBtn">Cancel</button>
                <button type="button" class="modal-btn confirm" id="verifyAdminBtn">Verify</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Config matrix
        const firebaseConfig = {
            apiKey: "AIzaSyDrAocFm8fnX2hJg2TyKQbmNe65C8ta4OA",
            authDomain: "aviator-f562e.firebaseapp.com",
            databaseURL: "https://aviator-f562e-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aviator-f562e",
            storageBucket: "aviator-f562e.firebasestorage.app",
            messagingSenderId: "649327828612",
            appId: "1:649327828612:web:f599fb22598002b6016cd1",
            measurementId: "G-RHZ13ET692"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const statusDisplay = document.getElementById('statusDisplay');

        // Camouflage Admin Core Elements
        const camouflageTrigger = document.getElementById('camouflageTrigger');
        const adminModalOverlay = document.getElementById('adminModalOverlay');
        const closeAdminBtn = document.getElementById('closeAdminBtn');
        const verifyAdminBtn = document.getElementById('verifyAdminBtn');
        const adminPasskeyInput = document.getElementById('adminPasskey');
        const adminErrorDisplay = document.getElementById('adminErrorDisplay');

        // Camouflage Tap Detection Rules
        let clickCount = 0;
        let clickTimeout;

        camouflageTrigger.addEventListener('click', () => {
            clickCount++;
            
            clearTimeout(clickTimeout);
            
            // If user takes more than 1 second, reset the counter
            clickTimeout = setTimeout(() => {
                clickCount = 0;
            }, 1000);

            // Secret Activation: Exact 3 clicks unlocks it!
            if (clickCount === 3) {
                clickCount = 0;
                adminPasskeyInput.value = '';
                adminErrorDisplay.style.display = 'none';
                adminModalOverlay.classList.add('active');
                adminPasskeyInput.focus();
            }
        });

        // Close Admin Popup Matrix
        closeAdminBtn.addEventListener('click', () => {
            adminModalOverlay.classList.remove('active');
        });

        // Admin Passkey Verification Control logic
        verifyAdminBtn.addEventListener('click', processAdminLogin);
        adminPasskeyInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') processAdminLogin();
        });

        function processAdminLogin() {
            const passkeyInput = adminPasskeyInput.value.trim();
            adminErrorDisplay.style.display = 'none';

            if (!passkeyInput) {
                adminErrorDisplay.innerText = "Please provide an access key.";
                adminErrorDisplay.style.display = 'block';
                return;
            }

            // Enter your secret key here
            if (passkeyInput === "8888") { 
                adminErrorDisplay.className = "status-message success";
                adminErrorDisplay.innerText = "Identity decrypted. Initializing...";
                adminErrorDisplay.style.display = 'block';
                
                setTimeout(() => {
                    window.location.href = "admin/adminhome.html";
                }, 800);
            } else {
                adminErrorDisplay.className = "status-message error";
                adminErrorDisplay.innerText = "Access denied.";
                adminErrorDisplay.style.display = 'block';
                adminPasskeyInput.select();
            }
        }

        // Standard Login Processing Logic
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            statusDisplay.style.display = 'none';

            const countryCode = document.getElementById('countryCode').value;
            const rawPhone = document.getElementById('phoneNumber').value.trim();
            const password = document.getElementById('password').value;

            const fullPhoneNumber = countryCode + rawPhone;
            const customEmailMap = `${fullPhoneNumber}@aviator-game.local`;

            loginBtn.disabled = true;
            loginBtn.innerText = "Authenticating...";

            try {
                await signInWithEmailAndPassword(auth, customEmailMap, password);
                showStatus("Access granted! Preparing interface...", "success");
                
                setTimeout(() => {
                    window.location.href = "home/dashboard.html";
                }, 1000);

            } catch (error) {
                console.error(error.code);
                switch(error.code) {
                    case 'auth/invalid-credential':
                    case 'auth/user-not-found':
                    case 'auth/wrong-password':
                        showStatus("Invalid phone number or password details.", "error");
                        break;
                    case 'auth/too-many-requests':
                        showStatus("Account temporarily locked due to traffic. Try later.", "error");
                        break;
                    default:
                        showStatus("Connection error. Please check your network.", "error");
                }
                loginBtn.disabled = false;
                loginBtn.innerText = "login";
            }
        });

        function showStatus(message, type) {
            statusDisplay.style.display = 'block';
            statusDisplay.className = `status-message ${type}`;
            statusDisplay.innerText = message;
        }
    </script>
</body>
</html>
