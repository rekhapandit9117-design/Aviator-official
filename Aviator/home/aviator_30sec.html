<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator Crash Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #121418;
            --bg-panel: #1b1e24;
            --bg-card: rgba(30, 34, 41, 0.7);
            --primary-red: #e92a3a;
            --primary-red-glow: rgba(233, 42, 58, 0.5);
            --primary-green: #28a745;
            --primary-green-glow: rgba(40, 167, 69, 0.5);
            --primary-orange: #f39c12;
            --text-light: #ffffff;
            --text-muted: #8b92a5;
            --border-color: #2c313c;
            /* Modal Variables */
            --neon-red: #ff0037;
            --neon-red-glow-modal: rgba(255, 0, 55, 0.4);
            --glass-card-modal: rgba(15, 5, 10, 0.85);
            --glass-border-modal: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Glassmorphism utilities */
        .glass {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
        }

        /* Loading & Start Overlay */
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        #start-overlay h1 {
            color: var(--primary-red);
            font-size: 3rem;
            text-shadow: 0 0 20px var(--primary-red-glow);
            margin-bottom: 20px;
            font-style: italic;
        }
        .btn-start {
            background: var(--primary-red);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 15px var(--primary-red-glow);
            transition: transform 0.2s;
        }
        .btn-start:active { transform: scale(0.95);
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
            height: 60px;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--primary-red);
            font-style: italic;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .wallet {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-dark);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid var(--primary-green);
            color: var(--primary-green);
            font-weight: bold;
        }
        .username-badge {
            background: rgba(255,255,255,0.1);
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        /* Main Layout */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Left Panel - Live Bets */
        .side-panel {
            width: 300px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }
        .panel-header {
            padding: 15px;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
        }
        .bets-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .bet-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 10px;
            background: var(--bg-dark);
            margin-bottom: 8px;
            border-radius: 6px;
            font-size: 0.9rem;
            align-items: center;
        }
        .bet-item.won { border-left: 3px solid var(--primary-green); background: rgba(40, 167, 69, 0.1);
        }
        .bet-item.lost { border-left: 3px solid var(--primary-red);
        }
        .bet-user { color: var(--text-muted); width: 40%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .bet-amount { font-weight: 600; width: 30%;
text-align: center;}
        .bet-win { font-weight: bold; color: var(--primary-green); width: 30%;
text-align: right;}

        /* Center Game Area */
        .center-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            position: relative;
        }

        /* History */
        .history-bar {
            display: flex;
            gap: 5px;
            overflow-x: hidden;
            padding: 5px;
            height: 40px;
            align-items: center;
        }
        .history-pill {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            background: rgba(255,255,255,0.1);
        }
        .history-pill.high { color: var(--primary-green);
border: 1px solid var(--primary-green); }
        .history-pill.low { color: var(--primary-red);
        }

        /* Game Canvas Area */
        .game-display {
            flex: 1;
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: #0b0c10;
            border: 2px solid var(--border-color);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Overlay Texts */
        .multiplier-text {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
            z-index: 10;
        }
        .flew-away {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-red);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: none;
            z-index: 10;
text-shadow: 0 0 10px var(--primary-red-glow);
        }
        .loading-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            color: var(--primary-green);
            display: none;
            z-index: 10;
        }
        .loading-bar {
            width: 200px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }
        .loading-fill {
            height: 100%;
            background: var(--primary-green);
            width: 0%;
            box-shadow: 0 0 10px var(--primary-green-glow);
        }

        /* Controls Area */
        .controls-area {
            height: 140px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .bet-panel {
            background: var(--bg-panel);
border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 600px;
        }
        .bet-inputs {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .input-group {
            display: flex;
            background: var(--bg-dark);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .input-group input {
            background: transparent;
border: none;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            width: 100%;
            padding: 10px;
            outline: none;
        }
        .input-group button {
            background: rgba(255,255,255,0.05);
border: none;
            color: var(--text-muted);
            padding: 0 15px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .input-group button:hover { background: rgba(255,255,255,0.1);
        }
        
        .auto-cashout {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-dark);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .auto-cashout label { font-size: 0.8rem; color: var(--text-muted);
        }
        .auto-cashout input[type="number"] {
            background: transparent;
border: none;
            color: white;
            width: 60px;
            text-align: right;
            font-weight: bold;
            outline: none;
        }

        .action-btn {
            flex: 1;
            border-radius: 12px;
            border: none;
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
align-items: center;
            justify-content: center;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.2);
        }
        .action-btn.bet {
            background: var(--primary-green);
color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            box-shadow: 0 0 15px var(--primary-green-glow);
        }
        .action-btn.bet:hover { background: #2fbc4e;
        }
        .action-btn.cashout {
            background: var(--primary-orange);
color: white;
            box-shadow: 0 0 15px rgba(243, 156, 18, 0.5);
        }
        .action-btn.cashout:hover { background: #f1a934;
        }
        .action-btn.disabled {
            background: #2c313c;
color: #5a6270;
            cursor: not-allowed;
            box-shadow: none;
        }
        .btn-subtext { font-size: 0.9rem; font-weight: 600;
opacity: 0.9; }

        /* Toasts */
        .toast-container {
            position: fixed;
top: 70px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }
        .toast {
            background: var(--bg-card);
backdrop-filter: blur(5px);
            border-left: 4px solid var(--primary-green);
            padding: 15px 20px;
            border-radius: 4px;
            color: white;
            font-weight: bold;
animation: slideIn 0.3s ease forwards, fadeOut 0.5s 2.5s forwards;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .toast.error { border-left-color: var(--primary-red);
        }

        /* =========================================
           PREMIUM INSUFFICIENT FUNDS MODAL STYLES 
           ========================================= */
        .premium-modal-overlay {
            position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 0, 2, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
align-items: center;
            justify-content: center;
            z-index: 99999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .premium-modal-overlay.active {
            opacity: 1;
pointer-events: auto;
        }
        .premium-modal-box {
            background: radial-gradient(circle at top, rgba(255, 0, 55, 0.08), transparent 70%), var(--glass-card-modal);
border: 1px solid var(--glass-border-modal);
            border-radius: 24px;
            padding: 32px 24px;
            width: 85%;
            max-width: 360px;
            text-align: center;
box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7), inset 0 0 20px rgba(255, 0, 55, 0.05);
            transform: translateY(30px) scale(0.95);
transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .premium-modal-overlay.active .premium-modal-box {
            transform: translateY(0) scale(1);
        }
        .modal-icon-container {
            position: relative;
width: 64px; height: 64px;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .alert-icon {
            width: 48px;
height: 48px;
            stroke: var(--neon-red); stroke-width: 1.5; fill: none;
            position: relative; z-index: 2;
        }
        .icon-glow {
            position: absolute;
top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 40px; height: 40px;
            background: var(--neon-red);
            filter: blur(25px); opacity: 0.6; border-radius: 50%;
        }
        .modal-title {
            font-size: 1.5rem;
font-weight: 900; color: #ffffff;
            letter-spacing: 1px; margin-bottom: 8px; text-transform: uppercase;
        }
        .modal-message {
            font-size: 0.9rem;
color: var(--text-muted);
            line-height: 1.5; margin-bottom: 28px; padding: 0 10px;
        }
        .modal-action-grid {
            display: grid;
grid-template-columns: 1fr 1fr; gap: 12px;
        }
        .modal-btn {
            border: none;
border-radius: 16px; padding: 14px 10px;
            font-size: 0.85rem; font-weight: 800; text-transform: uppercase;
            letter-spacing: 1px; cursor: pointer; display: flex;
            align-items: center;
justify-content: center; gap: 6px;
            transition: all 0.2s ease;
        }
        .modal-btn svg { width: 18px;
height: 18px; stroke: currentColor; stroke-width: 2.5; fill: none; }
        .btn-cancel { background: transparent;
color: var(--text-muted); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-cancel:active { background: rgba(255, 255, 255, 0.05);
        }
        .btn-add-funds { background: var(--neon-red); color: #ffffff; box-shadow: 0 4px 15px var(--neon-red-glow-modal);
        }
        .btn-add-funds:active { transform: scale(0.96);
        }

        @keyframes slideIn {
            from { transform: translateX(100%);
opacity: 0; }
            to { transform: translateX(0); opacity: 1;
        }
        }
        @keyframes fadeOut {
            from { opacity: 1;
        }
            to { opacity: 0; transform: translateY(-10px);
        }
        }
        @keyframes pulse {
            0% { transform: scale(1) translate(-50%, -50%);
        }
            50% { transform: scale(1.05) translate(-48%, -48%);
        }
            100% { transform: scale(1) translate(-50%, -50%);
        }
        }
        .anim-pulse { animation: pulse 0.5s infinite;
color: var(--primary-red) !important;}

        @media (max-width: 768px) {
            .side-panel { position: absolute;
left: -100%; height: calc(100vh - 60px); z-index: 100; }
            .controls-area { height: auto;
padding-bottom: 20px;}
            .bet-panel { flex-direction: column;
        }
            .action-btn { padding: 15px;
        }
            .multiplier-text { font-size: 3.5rem;
        }
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1>AVIATOR</h1>
        <button class="btn-start" id="btn-start-game">START GAME</button>

    <header>

            <div class="wallet">
        
        <i class="fa-solid fa-wallet"></i>
                <span id="ui-balance">0.00</span> ₹

    <div class="main-container">

                <span>All Bets</span>

id="online-count"><i class="fa-solid fa-users"></i> 1</span>
            </div>
            <div class="bets-list" id="bets-list-container"></div>
        </aside>

        <main class="center-area">
            <div class="history-bar" id="history-bar"></div>

                <div class="flew-away" id="flew-away-text">Flew Away!</div>
        
        <div class="multiplier-text" id="multiplier-display">1.00x</div>

                    <div class="loading-bar"><div class="loading-fill" id="loading-fill"></div></div>
                </div>
          
      <canvas id="gameCanvas"></canvas>
            </div>

            <div class="controls-area">
                <div class="bet-panel">
                    <div class="bet-inputs">
                        <div class="input-group">
     
                       <button id="btn-minus"><i class="fa-solid fa-minus"></i></button>
                            <input type="number" id="bet-input" value="10.00" min="1" step="1">
                            <button id="btn-plus"><i class="fa-solid fa-plus"></i></button>
          
              </div>

                            <label><input type="checkbox" id="auto-cashout-cb"> Auto Cashout</label>
                            <div><input 
type="number" id="auto-cashout-val" value="2.00" step="0.1" min="1.01"> x</div>
                        </div>
                    </div>
                    <button class="action-btn bet" id="action-btn">
                        <span id="action-main-text">BET</span>
   
                     <span class="btn-subtext" id="action-sub-text">10.00 ₹</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <div class="premium-modal-overlay" id="insufficientBalanceModal">
    
    <div class="premium-modal-box">
            <div class="modal-icon-container">
                <svg viewBox="0 0 24 24" class="alert-icon">
                    <path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
         
       <div class="icon-glow"></div>
            </div>
            <h2 class="modal-title">Low Balance</h2>
            <p class="modal-message">You don't have enough funds to place this bet.
Top up your vault to continue.</p>
            <div class="modal-action-grid">
                <button class="modal-btn btn-cancel" id="closeModalBtn">Cancel</button>
                <button class="modal-btn btn-add-funds" id="modalAddMoneyBtn">
                    <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
                
    Add Money
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, get, onValue, update, push, serverTimestamp, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
import { getFirestore, doc, getDoc, updateDoc, setDoc, onSnapshot, collection, addDoc, serverTimestamp as fsServerTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
const firebaseConfig = {
            apiKey: "AIzaSyDrAocFm8fnX2hJg2TyKQbmNe65C8ta4OA",
            authDomain: "aviator-f562e.firebaseapp.com",
            databaseURL: "https://aviator-f562e-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aviator-f562e",
            storageBucket: "aviator-f562e.firebasestorage.app",
            messagingSenderId: "649327828612",
            appId: "1:649327828612:web:f599fb22598002b6016cd1",
      
      measurementId: "G-RHZ13ET692"
        };

        const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
        const db = getDatabase(app);
        const firestore = getFirestore(app);
// State Variables
        let user = null;
let userData = { username: '', balance: 0 };
        let isLeader = false;
        
        let gameState = 'LOADING';
let currentMultiplier = 1.00;
        let crashPoint = 0;
        let flightStartTime = 0;
        let waitStartTime = 0;
let currentBet = { active: false, amount: 0, cashedOut: false, winAmount: 0 };
let nextBet = { active: false, amount: 10 };

        // DOM Elements
        const uiBalance = document.getElementById('ui-balance');
const uiUsername = document.getElementById('ui-username');
        const actionBtn = document.getElementById('action-btn');
        const actionMainText = document.getElementById('action-main-text');
        const actionSubText = document.getElementById('action-sub-text');
        const betInput = document.getElementById('bet-input');
const btnMinus = document.getElementById('btn-minus');
        const btnPlus = document.getElementById('btn-plus');
        const autoCashoutCb = document.getElementById('auto-cashout-cb');
        const autoCashoutVal = document.getElementById('auto-cashout-val');
        
        const multiplierDisplay = document.getElementById('multiplier-display');
const flewAwayText = document.getElementById('flew-away-text');
        const loadingContainer = document.getElementById('loading-container');
        const loadingFill = document.getElementById('loading-fill');
        const historyBar = document.getElementById('history-bar');
        const betsListContainer = document.getElementById('bets-list-container');
const onlineCountDisplay = document.getElementById('online-count');
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
// Modal Elements
        const modalOverlay = document.getElementById('insufficientBalanceModal');
        document.getElementById('closeModalBtn').addEventListener('click', () => modalOverlay.classList.remove('active'));
document.getElementById('modalAddMoneyBtn').addEventListener('click', () => window.location.href = "payment/addmoney.html");

        // Audio System
        const AudioContext = window.AudioContext ||
window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if(!audioCtx) audioCtx = new AudioContext();
if(audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playTick() {
            if(!audioCtx) return;
const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}
        function playCashout() {
            if(!audioCtx) return;
const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.5);
}
        function playCrash() {
            if(!audioCtx) return;
const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.3);
}

        document.getElementById('btn-start-game').addEventListener('click', () => {
            initAudio();
            document.getElementById('start-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('start-overlay').style.display = 'none', 500);
            signInAnonymously(auth);
        });
function showToast(msg, isError = false) {
            const toast = document.createElement('div');
toast.className = `toast ${isError ? 'error' : ''}`;
            toast.innerHTML = msg;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
}
        function formatMoney(val) { return parseFloat(val).toFixed(2);
}

        // --- User Initialization (Migrated to Firestore for Real Wallet) ---
        onAuthStateChanged(auth, async (u) => {
            if (u) {
                user = u;
                
                // Firestore Integration
    
            const userDocRef = doc(firestore, "users", user.uid);
                const snap = await getDoc(userDocRef);

                if (!snap.exists()) {
                    const randomNum = Math.floor(Math.random() * 9000) + 1000;
                  
  userData = {
                        username: `Player${randomNum}`,
                        balance: 0.00 
                    };
                    await setDoc(userDocRef, userData);
   
             } else {
                    userData = snap.data();
                }
                
                uiUsername.innerText = userData.username || "Player";
           
     uiBalance.innerText = formatMoney(userData.balance);

                // Real-time Firestore balance listener (Syncs instantly from Wallet)
                onSnapshot(userDocRef, (docSnap) => {
                    if (docSnap.exists()) {
                        userData.balance = docSnap.data().balance;
uiBalance.innerText = formatMoney(userData.balance);
                    }
                });
// Setup presence (online count - kept in RTDB for speed)
                const myConnectionsRef = ref(db, `presence/${user.uid}`);
set(myConnectionsRef, true);
                onDisconnect(myConnectionsRef).remove();

                onValue(ref(db, 'presence'), (s) => {
                    onlineCountDisplay.innerHTML = `<i class="fa-solid fa-users"></i> ${s.size}`;
                });
setupMultiplayer();
            }
        });
// --- Multiplayer / Leader System ---
        function setupMultiplayer() {
            const leaderRef = ref(db, 'game/leader');
const stateRef = ref(db, 'game/state');
            const multiplierRef = ref(db, 'game/multiplier');
onValue(leaderRef, (snap) => {
                if (!snap.exists()) {
                    set(leaderRef, user.uid);
                    onDisconnect(leaderRef).remove();
                    isLeader = true;
                
    runLeaderLoop();
                } else {
                    isLeader = (snap.val() === user.uid);
                }
            });
onValue(stateRef, (snap) => {
                if (snap.exists() && !isLeader) syncState(snap.val());
            });
onValue(multiplierRef, (snap) => {
                if (snap.exists() && !isLeader && gameState === 'PLAYING') {
                    currentMultiplier = snap.val();
                    updateDisplay();
                }
            });
onValue(ref(db, 'game/bets'), (snap) => renderBets(snap.val() || {}));
            onValue(ref(db, 'game/history'), (snap) => renderHistory(snap.val() || []));
}

        function syncState(data) {
            const prevState = gameState;
gameState = data.status;
            
            if (gameState === 'WAITING') {
                if(prevState !== 'WAITING') prepareNextRound();
waitStartTime = data.startTime;
            } else if (gameState === 'PLAYING') {
                if(prevState !== 'PLAYING') startFlight();
flightStartTime = data.startTime;
            } else if (gameState === 'CRASHED') {
                if(prevState !== 'CRASHED') {
                    currentMultiplier = data.crashPoint;
handleCrash();
                }
            }
        }

        // --- Leader Logic ---
        function generateFairCrash() {
            const r = Math.random();
let c = 1.00;
            if (r < 0.05) c = 1.00;
else if (r < 0.5) c = 1.01 + Math.random() * 0.5;
else if (r < 0.8) c = 1.5 + Math.random() * 1.5;
else if (r < 0.95) c = 3.0 + Math.random() * 7;
            else c = 10.0 + Math.random() * 40;
return parseFloat(c.toFixed(2));
        }

        async function runLeaderLoop() {
            if (!isLeader) return;
while (isLeader) {
                await set(ref(db, 'game/bets'), null);
const waitTime = Date.now();
                await update(ref(db, 'game/state'), { status: 'WAITING', startTime: waitTime });
                syncState({ status: 'WAITING', startTime: waitTime });
let t = 0;
                while (t < 30000 && isLeader) {
                    await new Promise(r => setTimeout(r, 100));
t += 100;
                    if(t % 1000 === 0) playTick();
                }
                if(!isLeader) break;
crashPoint = generateFairCrash();
                const startTime = Date.now();
                await update(ref(db, 'game/state'), { status: 'PLAYING', startTime: startTime });
syncState({ status: 'PLAYING', startTime: startTime });

                let alive = true;
while (alive && isLeader) {
                    await new Promise(r => setTimeout(r, 100));
const elapsed = (Date.now() - startTime) / 1000;
                    currentMultiplier = Math.max(1.00, Math.pow(Math.E, 0.06 * elapsed));
if (currentMultiplier >= crashPoint) {
                        currentMultiplier = crashPoint;
alive = false;
                    }
                    set(ref(db, 'game/multiplier'), parseFloat(currentMultiplier.toFixed(2)));
if(isLeader) updateDisplay();
                }
                if(!isLeader) break;
await update(ref(db, 'game/state'), { status: 'CRASHED', crashPoint: crashPoint });
                syncState({ status: 'CRASHED', crashPoint: crashPoint });
const histSnap = await get(ref(db, 'game/history'));
                let history = histSnap.val() || [];
                history.unshift(crashPoint);
                if(history.length > 15) history.pop();
await set(ref(db, 'game/history'), history);

                await new Promise(r => setTimeout(r, 3000));
}
        }

        // --- Client Logic ---
        function prepareNextRound() {
            multiplierDisplay.style.display = 'none';
flewAwayText.style.display = 'none';
            loadingContainer.style.display = 'block';
            multiplierDisplay.classList.remove('anim-pulse');
            multiplierDisplay.style.color = 'white';
if (nextBet.active) {
                placeBetReal(nextBet.amount);
nextBet.active = false;
            } else {
                resetButtonState();
}
            
            currentMultiplier = 1.00;
resetCanvas();
        }

        function startFlight() {
            loadingContainer.style.display = 'none';
multiplierDisplay.style.display = 'block';
            flewAwayText.style.display = 'none';
            
            if (currentBet.active) setCashoutButton();
            else if (nextBet.active) setQueuedButton();
            else setWaitButton();
            
            animateCanvas();
}

        function handleCrash() {
            playCrash();
updateDisplay();
            multiplierDisplay.classList.add('anim-pulse');
            flewAwayText.style.display = 'block';
            
            if (currentBet.active && !currentBet.cashedOut) {
                currentBet.active = false;
update(ref(db, `game/bets/${user.uid}`), { status: 'LOST' });
                showToast(`Crashed at ${currentMultiplier.toFixed(2)}x. Bet Lost.`, true);
                resetButtonState();
} else if (!currentBet.active) {
                if (nextBet.active) {
                    setQueuedButton();
} else {
                    resetButtonState();
}
            }
        }

        function updateDisplay() {
            if(gameState === 'WAITING') {
                const elapsed = Date.now() - waitStartTime;
const left = Math.max(0, 30000 - elapsed);
                loadingFill.style.width = `${((30000 - left) / 30000) * 100}%`;
} else if (gameState === 'PLAYING' || gameState === 'CRASHED') {
                multiplierDisplay.innerText = currentMultiplier.toFixed(2) + 'x';
if (gameState === 'PLAYING' && currentBet.active && !currentBet.cashedOut) {
                    const potentialWin = (currentBet.amount * currentMultiplier).toFixed(2);
actionSubText.innerText = `WIN ${potentialWin} ₹`;
                    
                    if (autoCashoutCb.checked && currentMultiplier >= parseFloat(autoCashoutVal.value)) {
                        doCashout();
}
                }
            }
        }

        // --- Betting System (Connecting to Firestore Wallet) ---
        async function toggleBet() {
            if (!user) return;
const amt = parseFloat(betInput.value);
            if (isNaN(amt) || amt < 1) {
                showToast('Invalid bet amount', true);
return;
            }

            if (gameState === 'WAITING') {
                if (currentBet.active) {
                    currentBet.active = false;
// Refund to Firestore
                    await updateDoc(doc(firestore, "users", user.uid), { balance: userData.balance + currentBet.amount });
// Log Refund
                    await addDoc(collection(firestore, "users", user.uid, "history"), {
                        type: "deposit", amount: currentBet.amount, timestamp: fsServerTimestamp(), note: "Bet Refunded"
                    });
remove(ref(db, `game/bets/${user.uid}`));
                    resetButtonState();
                } else {
                    placeBetReal(amt);
}
            } else if (gameState === 'PLAYING' || gameState === 'CRASHED') {
                if (gameState === 'PLAYING' && currentBet.active && !currentBet.cashedOut) {
                    doCashout();
} else {
                    if (nextBet.active) {
                        nextBet.active = false;
resetButtonState();
                    } else {
                        if(userData.balance < amt) {
                            modalOverlay.classList.add('active');
return;
                        }
                        nextBet = { active: true, amount: amt };
setQueuedButton();
                    }
                }
            }
        }

        async function placeBetReal(amt) {
            if(userData.balance < amt) {
                modalOverlay.classList.add('active');
resetButtonState();
                return;
            }
            
            currentBet = { active: true, amount: amt, cashedOut: false, winAmount: 0 };
// Deduct from Firestore Real Wallet
            await updateDoc(doc(firestore, "users", user.uid), { balance: userData.balance - amt });
// Push history to Ledger
            await addDoc(collection(firestore, "users", user.uid, "history"), {
                type: "withdraw", amount: amt, timestamp: fsServerTimestamp(), note: "Aviator Bet Placed"
            });
// Register bet in Game State with correct Firestore Username
            set(ref(db, `game/bets/${user.uid}`), {
                username: userData.username || `Player`, 
                amount: amt, 
                status: 'PLAYING', 
                multiplier: 0, 
   
             win: 0
            });
setCancelButton();
        }

        async function doCashout() {
            if (!currentBet.active || currentBet.cashedOut || gameState !== 'PLAYING') return;
playCashout();
            currentBet.cashedOut = true;
            currentBet.active = false;
            
            const winMultiplier = currentMultiplier;
            const winAmt = currentBet.amount * winMultiplier;
// Add winnings to Firestore Real Wallet
            await updateDoc(doc(firestore, "users", user.uid), { balance: userData.balance + winAmt });
// Push History to Ledger
            await addDoc(collection(firestore, "users", user.uid, "history"), {
                type: "deposit", amount: winAmt, timestamp: fsServerTimestamp(), note: `Aviator Cashout (${winMultiplier.toFixed(2)}x)`
            });
// Update bet status in Game State
            update(ref(db, `game/bets/${user.uid}`), {
                status: 'CASHED_OUT', multiplier: winMultiplier.toFixed(2), win: winAmt.toFixed(2)
            });
showToast(`Cashed out at ${winMultiplier.toFixed(2)}x! Won ${winAmt.toFixed(2)} ₹`);
            resetButtonState();
        }

        // Controls
        function resetButtonState() { actionBtn.className = 'action-btn bet';
actionBtn.style.background = '';
            actionMainText.innerText = 'BET'; actionSubText.innerText = betInput.value + ' ₹';
}
        function setCancelButton() { actionBtn.className = 'action-btn cashout';
            actionBtn.style.background = '#e74c3c';
actionMainText.innerText = 'CANCEL'; actionSubText.innerText = 'Waiting...'; }
        function setCashoutButton() { actionBtn.className = 'action-btn cashout';
actionBtn.style.background = ''; actionMainText.innerText = 'CASHOUT'; }
        function setWaitButton() { actionBtn.className = 'action-btn disabled';
actionBtn.style.background = '';
            actionMainText.innerText = 'WAIT'; actionSubText.innerText = 'Next Round';
}
        function setQueuedButton() { actionBtn.className = 'action-btn cashout';
            actionBtn.style.background = '#e74c3c';
actionMainText.innerText = 'CANCEL'; actionSubText.innerText = 'Next Round';
        }

        betInput.addEventListener('input', () => { if (!currentBet.active && !nextBet.active) actionSubText.innerText = betInput.value + ' ₹'; });
btnMinus.addEventListener('click', () => { betInput.value = Math.max(1, parseInt(betInput.value) - 10).toFixed(2); betInput.dispatchEvent(new Event('input')); });
btnPlus.addEventListener('click', () => { betInput.value = (parseInt(betInput.value) + 10).toFixed(2); betInput.dispatchEvent(new Event('input')); });
        actionBtn.addEventListener('click', toggleBet);
// Render UI
        function renderBets(betsObj) {
            betsListContainer.innerHTML = '';
const bets = Object.values(betsObj);
            bets.sort((a,b) => b.amount - a.amount);
            bets.forEach(b => {
                const div = document.createElement('div');
                div.className = `bet-item ${b.status === 'CASHED_OUT' ? 'won' : (b.status==='LOST'?'lost':'')}`;
                let winHtml = b.status === 'CASHED_OUT' ? `${b.win} ₹ (${b.multiplier}x)` : (b.status === 'PLAYING' ? '...' : 'LOST');
            
                div.innerHTML = `<div class="bet-user">${b.username || 'Player'}</div><div class="bet-amount">${b.amount} ₹</div><div class="bet-win">${winHtml}</div>`;
                betsListContainer.appendChild(div);
            });
}

        function renderHistory(history) {
            historyBar.innerHTML = '';
history.forEach(m => {
                const div = document.createElement('div');
                div.className = `history-pill ${m >= 2.0 ? 'high' : 'low'}`; div.innerText = m.toFixed(2) + 'x';
                historyBar.appendChild(div);
            });
}

        // --- Canvas Graph System ---
        function resizeCanvas() { canvas.width = canvas.parentElement.clientWidth;
canvas.height = canvas.parentElement.clientHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        let animFrame;
let pX = 0, pY = 0;
        function resetCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); pX = 0; pY = canvas.height;
drawGrid(); }
        function drawGrid() {
            ctx.strokeStyle = '#1e2229';
ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=50) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
}
            for(let i=0; i<canvas.height; i+=50) { ctx.beginPath(); ctx.moveTo(0, i);
ctx.lineTo(canvas.width, i); ctx.stroke(); }
        }
        function animateCanvas() {
            if(gameState !== 'PLAYING') return;
ctx.clearRect(0, 0, canvas.width, canvas.height); drawGrid();
            const maxVisualMult = Math.max(2.0, currentMultiplier + 0.5);
const progressX = Math.min(1, (currentMultiplier - 1) / (maxVisualMult - 1));
            const progressY = Math.min(1, Math.log10(currentMultiplier) / Math.log10(maxVisualMult));
const targetX = 50 + (canvas.width - 100) * progressX;
const targetY = canvas.height - 50 - (canvas.height - 100) * progressY;
            pX += (targetX - pX) * 0.1;
pY += (targetY - pY) * 0.1;
            
            ctx.beginPath(); ctx.moveTo(0, canvas.height); ctx.quadraticCurveTo(pX * 0.5, canvas.height, pX, pY);
            ctx.lineWidth = 4;
ctx.strokeStyle = '#e92a3a'; ctx.stroke();
            ctx.lineTo(pX, canvas.height); ctx.lineTo(0, canvas.height);
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, 'rgba(233, 42, 58, 0.4)');
gradient.addColorStop(1, 'rgba(233, 42, 58, 0.0)');
            ctx.fillStyle = gradient; ctx.fill();
            
            ctx.beginPath(); ctx.arc(pX, pY, 6, 0, Math.PI * 2); ctx.fillStyle = '#fff';
ctx.fill();
            ctx.shadowColor = '#e92a3a'; ctx.shadowBlur = 15; ctx.beginPath(); ctx.arc(pX, pY, 6, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
animFrame = requestAnimationFrame(animateCanvas);
        }

        setInterval(() => { if(gameState === 'WAITING' || gameState === 'PLAYING') updateDisplay(); }, 50);
</script>
