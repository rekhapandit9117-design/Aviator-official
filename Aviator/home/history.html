<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator Premium - Global Ranks</title>
    <style>
        :root {
            --bg-pure: #030002;
            --neon-red: #ff0037;
            --neon-red-glow: rgba(255, 0, 55, 0.45);
            --neon-red-dim: rgba(255, 0, 55, 0.15);
            --success-green: #00e676;
            --success-glow: rgba(0, 230, 118, 0.3);
            --glass-card: rgba(18, 5, 8, 0.6);
            --glass-border: rgba(255, 0, 55, 0.18);
            --text-main: #ffffff;
            --text-muted: #8e8a8d;
            --premium-gold: #ffb700;
            --silver: #e0e0e0;
            --bronze: #cd7f32;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cabinet Grotesk', 'Segoe UI', system-ui, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-pure);
            background-image: 
                radial-gradient(circle at 50% -10%, rgba(255, 0, 55, 0.18) 0%, transparent 50%),
                linear-gradient(180deg, #050002 0%, #0c0104 100%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            padding-bottom: 95px;
        }

        /* Top Navbar Layout */
        .top-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: rgba(5, 0, 2, 0.85);
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .brand-header {
            font-size: 1.2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-header svg {
            width: 22px;
            height: 22px;
            stroke: var(--neon-red);
            stroke-width: 2;
            fill: none;
            filter: drop-shadow(0 0 6px var(--neon-red));
        }

        /* Leaderboard Workspace */
        .ranks-container {
            padding: 18px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex: 1;
        }

        .rank-title-section {
            text-align: center;
            margin-bottom: 8px;
        }

        .rank-title-section h2 {
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon-red-dim);
        }

        .rank-title-section p {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Row Layout Matrices */
        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .player-row {
            background: var(--glass-card);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.2s ease;
        }

        /* Podium Modifiers */
        .player-row.rank-1 {
            border-color: rgba(255, 183, 0, 0.3);
            background: linear-gradient(90deg, rgba(255, 183, 0, 0.08), var(--glass-card));
        }

        .player-row.rank-2 {
            border-color: rgba(224, 224, 224, 0.25);
            background: linear-gradient(90deg, rgba(224, 224, 224, 0.05), var(--glass-card));
        }

        .player-row.rank-3 {
            border-color: rgba(205, 127, 50, 0.25);
            background: linear-gradient(90deg, rgba(205, 127, 50, 0.05), var(--glass-card));
        }

        .identity-side {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .rank-number-box {
            width: 32px;
            font-size: 1rem;
            font-weight: 900;
            color: var(--text-muted);
            text-align: center;
        }

        .rank-1 .rank-number-box { color: var(--premium-gold); font-size: 1.2rem; }
        .rank-2 .rank-number-box { color: var(--silver); }
        .rank-3 .rank-number-box { color: var(--bronze); }

        .player-meta {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .player-name {
            font-size: 0.95rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: capitalize;
        }

        .player-phone {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: monospace;
        }

        .balance-side {
            font-size: 1.05rem;
            font-weight: 900;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        .rank-1 .balance-side { color: var(--premium-gold); }

        /* Loader Component */
        .matrix-loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 0;
            color: var(--text-muted);
            font-size: 0.9rem;
            gap: 12px;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid rgba(255, 0, 55, 0.1);
            border-top-color: var(--neon-red);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Bottom Sticky Navigation Unit (Image 2 Verification Specs) */
        .bottom-navigation-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 72px;
            background: #000000;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            padding: 0 8px;
            box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.9);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.58rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            gap: 7px;
            flex: 1;
            height: 100%;
            transition: all 0.2s ease;
        }

        .nav-item.active { 
            color: var(--text-main); 
        }

        .nav-icon-container {
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-icon-container svg {
            width: 100%;
            height: 100%;
            stroke: #6e6a6d;
            stroke-width: 2;
            fill: none;
            transition: all 0.2s ease;
        }

        .nav-item.active .nav-icon-container svg {
            stroke: var(--neon-red);
            filter: drop-shadow(0 0 5px var(--neon-red));
        }

        /* Premium Floating Toast UI Portal */
        .toast-notification-center {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-40px);
            width: calc(100% - 32px);
            max-width: 380px;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast-notification-center.display-active {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }

        .premium-toast-box {
            padding: 16px 20px;
            border-radius: 18px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .premium-toast-box.type-error {
            background: rgba(22, 3, 8, 0.94);
            border: 1px solid var(--neon-red);
            box-shadow: 0 0 25px rgba(255, 0, 55, 0.25), 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .premium-toast-box.type-success {
            background: rgba(2, 20, 11, 0.94);
            border: 1px solid var(--success-green);
            box-shadow: 0 0 25px rgba(0, 230, 118, 0.2), 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .toast-status-icon-frame {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .toast-status-icon-frame svg {
            width: 22px;
            height: 22px;
        }

        .type-error .toast-status-icon-frame svg { stroke: var(--neon-red); }
        .type-success .toast-status-icon-frame svg { stroke: var(--success-green); }

        .toast-message-string {
            font-size: 0.88rem;
            font-weight: 700;
            line-height: 1.4;
            letter-spacing: 0.2px;
        }
    </style>
</head>
<body>

    <div class="toast-notification-center" id="globalToastHub">
        <div class="premium-toast-box type-error" id="toastVisualBlock">
            <div class="toast-status-icon-frame" id="toastIconSlot"></div>
            <div class="toast-message-string" id="toastMessageSlot">Establishing ledger connectivity...</div>
        </div>
    </div>

    <header class="top-navbar">
        <div class="brand-header">
            <svg viewBox="0 0 24 24">
                <line x1="18" y1="20" x2="18" y2="10"/>
                <line x1="12" y1="20" x2="12" y2="4"/>
                <line x1="6" y1="20" x2="6" y2="14"/>
            </svg>
            System Standings
        </div>
    </header>

    <main class="ranks-container">
        <section class="rank-title-section">
            <h2>Global Ranks</h2>
            <p>Top node accounts ordered by ledger valuation</p>
        </section>

        <div class="leaderboard-list" id="leaderboardOutput">
            <div class="matrix-loader">
                <div class="spinner"></div>
                <span>Compiling real-time database arrays...</span>
            </div>
        </div>
    </main>

    <nav class="bottom-navigation-bar">
        <a href="dashboard.html" class="nav-item">
            <div class="nav-icon-container">
                <svg viewBox="0 0 24 24">
                    <rect x="2" y="5" width="20" height="14" rx="3" ry="3" />
                    <circle cx="6" cy="12" r="1" fill="currentColor" stroke-none />
                </svg>
            </div>
            <span>Console</span>
        </a>

        <a href="history.html" class="nav-item active">
            <div class="nav-icon-container">
                <svg viewBox="0 0 24 24">
                    <line x1="18" y1="20" x2="18" y2="10" />
                    <line x1="12" y1="20" x2="12" y2="4" />
                    <line x1="6" y1="20" x2="6" y2="14" />
                </svg>
            </div>
            <span>Ranks</span>
        </a>

        <a href="wallet.html" class="nav-item">
            <div class="nav-icon-container">
                <svg viewBox="0 0 24 24">
                    <polygon points="12 2 22 8.5 12 22 2 8.5" />
                </svg>
            </div>
            <span>Vault</span>
        </a>

        <a href="profile.html" class="nav-item">
            <div class="nav-icon-container">
                <svg viewBox="0 0 24 24">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            </div>
            <span>Network</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDrAocFm8fnX2hJg2TyKQbmNe65C8ta4OA",
            authDomain: "aviator-f562e.firebaseapp.com",
            databaseURL: "https://aviator-f562e-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aviator-f562e",
            storageBucket: "aviator-f562e.firebasestorage.app",
            messagingSenderId: "649327828612",
            appId: "1:649327828612:web:f599fb22598002b6016cd1",
            measurementId: "G-RHZ13ET692"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const leaderboardOutput = document.getElementById('leaderboardOutput');

        // Monitor connection lines in real-time to trigger instant visual alerts if drop occurs
        window.addEventListener('offline', () => {
            dispatchPremiumToast("Hardware Link Disconnected. Sync stream offline.", "error");
        });

        window.addEventListener('online', () => {
            dispatchPremiumToast("Hardware Link Restored. Re-syncing database matrices...", "success");
        });

        // Security Session Monitor Gate
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                dispatchPremiumToast("Session signature missing. Routing to secure validation terminal...", "error");
                setTimeout(() => {
                    window.location.href = "../login.html";
                }, 2000);
            } else {
                if (!navigator.onLine) {
                    dispatchPremiumToast("Warning: Modulating ledger data over broken link.", "error");
                }
                listenToLiveLeaderboardData();
            }
        });

        // Realtime Balance sorting query data tracking stream loop
        function listenToLiveLeaderboardData() {
            const usersRef = collection(db, "users");
            const rankQuery = query(usersRef, orderBy("balance", "desc"));

            onSnapshot(rankQuery, (snapshot) => {
                if (snapshot.empty) {
                    leaderboardOutput.innerHTML = `<div class="matrix-loader"><span>No user entities detected in data arrays.</span></div>`;
                    return;
                }

                let dynamicRowsHtml = "";
                let indexCounter = 1;

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    
                    const rawName = data.name || data.fullName || "Operator User";
                    const formattedBalance = data.balance !== undefined ? parseFloat(data.balance).toFixed(2) : "0.00";
                    let rawPhone = data.phone || data.phoneNumber || "---";

                    if(rawPhone !== "---" && rawPhone.length > 5) {
                        rawPhone = rawPhone.slice(0, 4) + "••••" + rawPhone.slice(-2);
                    }

                    let rankModifierClass = "";
                    if (indexCounter === 1) rankModifierClass = "rank-1";
                    else if (indexCounter === 2) rankModifierClass = "rank-2";
                    else if (indexCounter === 3) rankModifierClass = "rank-3";

                    dynamicRowsHtml += `
                        <div class="player-row ${rankModifierClass}">
                            <div class="identity-side">
                                <div class="rank-number-box">${indexCounter}</div>
                                <div class="player-meta">
                                    <span class="player-name">${rawName}</span>
                                    <span class="player-phone">${rawPhone}</span>
                                </div>
                            </div>
                            <div class="balance-side">₹${formattedBalance}</div>
                        </div>
                    `;
                    indexCounter++;
                });

                leaderboardOutput.innerHTML = dynamicRowsHtml;

            }, (error) => {
                console.error("Firestore operation restricted: ", error);
                dispatchPremiumToast("Cloud pipeline error. Verification security drop encountered.", "error");
                leaderboardOutput.innerHTML = `<div class="matrix-loader"><span>Security processing restriction error.</span></div>`;
            });
        }

        // Stylish Custom Toast Controller Interface Module Engine
        let toastPointer = null;
        function dispatchPremiumToast(message, type = "error") {
            const hub = document.getElementById('globalToastHub');
            const visualBlock = document.getElementById('toastVisualBlock');
            const iconSlot = document.getElementById('toastIconSlot');
            const msgSlot = document.getElementById('toastMessageSlot');

            visualBlock.className = `premium-toast-box type-${type}`;
            msgSlot.textContent = message;

            // Premium custom vectors for clear styling distinction
            const errorSvg = `<svg fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
            const successSvg = `<svg fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`;
            
            iconSlot.innerHTML = (type === "success") ? successSvg : errorSvg;

            if (toastPointer) clearTimeout(toastPointer);

            hub.classList.add('display-active');

            // Remain displayed slightly longer if it is a major network connection drop
            const visibilityWindow = !navigator.onLine ? 5000 : 3500;

            toastPointer = setTimeout(() => {
                hub.classList.remove('display-active');
            }, visibilityWindow);
        }
    </script>
</body>
</html>
