<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator Premium - Register</title>
    <style>
        :root {
            --bg-dark: #0a0b10;
            --card-bg: rgba(22, 24, 37, 0.7);
            --aviator-red: #ff002b;
            --aviator-red-glow: rgba(255, 0, 43, 0.4);
            --text-main: #ffffff;
            --text-muted: #7e84a3;
            --border-color: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(10, 11, 16, 0.6);
            --success-green: #00e676;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cabinet Grotesk', 'Segoe UI', system-ui, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: -webkit-fill-available; /* Fixed mobile viewport jumping bug */
            overflow-x: hidden;
            position: relative;
            padding: 16px;
        }

        /* Responsive Aviation Grid Overlay */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            transform: perspective(500px) rotateX(60deg) translateY(-20%);
            animation: gridMove 20s linear infinite;
            z-index: 0;
            opacity: 0.6;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 600px; }
        }

        .glow-orb {
            position: absolute;
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, var(--aviator-red-glow) 0%, transparent 70%);
            bottom: -50px;
            left: -50px;
            z-index: 0;
            pointer-events: none;
            filter: blur(30px);
        }

        /* Glassmorphism Card Optimized for Mobile Display screens */
        .register-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px) saturate(120%);
            -webkit-backdrop-filter: blur(16px) saturate(120%);
            width: 100%;
            max-width: 400px;
            padding: 24px 20px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            z-index: 1;
            position: relative;
        }

        /* Compact Header Back Button */
        .card-navigation {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 12px;
        }

        .back-arrow-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .back-arrow-btn:active, .back-arrow-btn:hover {
            background: rgba(255, 0, 43, 0.1);
            border-color: var(--aviator-red);
            color: var(--aviator-red);
        }

        .brand-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .brand-logo {
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-main);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .brand-logo span {
            color: var(--aviator-red);
            text-shadow: 0 0 15px var(--aviator-red);
            display: inline-block;
            animation: flightVibe 3s ease-in-out infinite;
        }

        @keyframes flightVibe {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .brand-tagline {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 4px;
        }

        /* Optimized form spacings for phone heights */
        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .phone-input-container {
            display: flex;
            gap: 8px;
        }

        .country-select {
            width: 85px;
            padding: 12px 8px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.9rem;
            outline: none;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .phone-input-container .form-input {
            flex: 1;
        }

        .form-input:focus, .country-select:focus {
            border-color: var(--aviator-red);
            background: rgba(10, 11, 16, 0.9);
            box-shadow: 0 0 10px rgba(255, 0, 43, 0.15);
        }

        .terms-container {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin: 16px 0;
            font-size: 0.78rem;
            color: var(--text-muted);
            line-height: 1.4;
            cursor: pointer;
        }

        .terms-container input {
            accent-color: var(--aviator-red);
            margin-top: 2px;
            transform: scale(1.05);
        }

        /* High-Grade Touchscreen Button sizing */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--aviator-red);
            border: none;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            box-shadow: 0 4px 12px var(--aviator-red-glow);
            transition: all 0.2s ease;
        }

        .submit-btn:active {
            transform: scale(0.98);
            background: #d60024;
        }

        .submit-btn:disabled {
            background: #4a151d;
            color: var(--text-muted);
            box-shadow: none;
        }

        .status-message {
            font-size: 0.8rem;
            margin-top: 12px;
            text-align: center;
            display: none;
        }

        .status-message.error { color: var(--aviator-red); }
        .status-message.success { color: var(--success-green); }

        .login-prompt {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .login-prompt a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 700;
            margin-left: 4px;
            border-bottom: 1px solid var(--aviator-red);
            padding-bottom: 1px;
        }

        /* Screen Width optimization tweak */
        @media (max-width: 360px) {
            .register-card {
                padding: 18px 14px;
            }
            .brand-logo {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

    <div class="glow-orb"></div>

    <div class="register-card">
        <div class="card-navigation">
            <a href="login.html" class="back-arrow-btn">←</a>
        </div>

        <div class="brand-section">
            <div class="brand-logo">Aviator <span>✈</span></div>
            <div class="brand-tagline">Create New Account</div>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" class="form-input" placeholder="Enter Full Name" required autocomplete="name">
            </div>

            <div class="form-group">
                <label for="phoneNumber">Phone Number</label>
                <div class="phone-input-container">
                    <select id="countryCode" class="country-select">
                        <option value="+91" selected>🇮🇳 +91</option>
                    </select>
                    <input type="tel" id="phoneNumber" class="form-input" placeholder="9876543210" required autocomplete="tel">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="Min. 6 characters" required autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm Password" required autocomplete="new-password">
            </div>

            <label class="terms-container">
                <input type="checkbox" id="termsBox" required>
                <span>I confirm that I am at least 18 years old and agree to the Terms of Service.</span>
            </label>

            <button type="submit" class="submit-btn" id="registerBtn">Register</button>
            <div class="status-message" id="statusDisplay"></div>
        </form>

        <div class="login-prompt">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Connects to your standard Firebase configuration profiles safely
        const firebaseConfig = {
            apiKey: "AIzaSyDrAocFm8fnX2hJg2TyKQbmNe65C8ta4OA",
            authDomain: "aviator-f562e.firebaseapp.com",
            databaseURL: "https://aviator-f562e-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aviator-f562e",
            storageBucket: "aviator-f562e.firebasestorage.app",
            messagingSenderId: "649327828612",
            appId: "1:649327828612:web:f599fb22598002b6016cd1",
            measurementId: "G-RHZ13ET692"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        const statusDisplay = document.getElementById('statusDisplay');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            statusDisplay.style.display = 'none';

            const fullName = document.getElementById('fullName').value.trim();
            const countryCode = document.getElementById('countryCode').value;
            const rawPhone = document.getElementById('phoneNumber').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showStatus("Passwords do not match.", "error");
                return;
            }

            if (password.length < 6) {
                showStatus("Password must be at least 6 characters.", "error");
                return;
            }

            const fullPhoneNumber = countryCode + rawPhone;
            // Background pseudo-email mapper logic string match execution
            const customEmailMap = `${fullPhoneNumber}@aviator-game.local`;

            registerBtn.disabled = true;
            registerBtn.innerText = "Processing...";

            try {
                // 1. Create authentication user entry
                const userCredential = await createUserWithEmailAndPassword(auth, customEmailMap, password);
                const user = userCredential.user;

                // 2. Initialize and store profile properties inside Cloud Firestore
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    fullName: fullName,
                    phone: fullPhoneNumber,
                    balance: 0.00,
                    createdAt: new Date()
                });

                showStatus("Registration successful! Loading cockpit...", "success");
                
                // Route adjusted to inside the home directory dashboard
                setTimeout(() => {
                    window.location.href = "home/dashboard.html";
                }, 1200);

            } catch (error) {
                console.error("Firestore/Auth Exception:", error.code, error.message);
                
                switch(error.code) {
                    case 'auth/email-already-in-use':
                        showStatus("This phone number is already registered.", "error");
                        break;
                    case 'auth/weak-password':
                        showStatus("The chosen password is too weak.", "error");
                        break;
                    default:
                        showStatus("Registration failed. Verify Firestore rules / connection setup.", "error");
                }
                
                registerBtn.disabled = false;
                registerBtn.innerText = "Register";
            }
        });

        function showStatus(message, type) {
            statusDisplay.style.display = 'block';
            statusDisplay.className = `status-message ${type}`;
            statusDisplay.innerText = message;
        }
    </script>
</body>
</html>
