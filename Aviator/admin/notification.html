<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Notification Update</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #120101; /* Deep dark red-black background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #1a0202;
            padding: 30px;
            border-radius: 12px;
            border: 2px solid #ff0033;
            /* Neon Red Glow */
            box-shadow: 0 0 15px #ff0033, inset 0 0 10px #ff0033;
            width: 100%;
            max-width: 400px;
            color: #fff;
        }
        h2 { 
            margin-top: 0; 
            color: #ff0033; 
            text-shadow: 0 0 10px #ff0033; 
            text-align: center;
            letter-spacing: 1px;
        }
        label { 
            font-weight: bold; 
            display: block; 
            margin-bottom: 8px; 
            color: #ff6666; 
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            background: #2a0404;
            border: 1px solid #ff0033;
            border-radius: 4px;
            box-sizing: border-box;
            color: #fff;
            outline: none;
            transition: box-shadow 0.3s;
        }
        input:focus, textarea:focus {
            box-shadow: 0 0 10px #ff0033;
        }
        button {
            width: 100%;
            background-color: #ff0033;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px #ff0033;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        button:hover { 
            background-color: #ff3355; 
            box-shadow: 0 0 20px #ff3355;
        }
        .status { 
            text-align: center; 
            font-weight: bold; 
            color: #00ff66; 
            text-shadow: 0 0 5px #00ff66;
            margin-top: 15px; 
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Broadcast Alert</h2>
    
    <label for="title">Notification Title</label>
    <input type="text" id="title" placeholder="e.g., System Maintenance">

    <label for="message">Message</label>
    <textarea id="message" rows="4" placeholder="Type your update here..."></textarea>

    <button id="sendBtn">Publish Update</button>
    <div class="status" id="statusMsg"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDrAocFm8fnX2hJg2TyKQbmNe65C8ta4OA",
        authDomain: "aviator-f562e.firebaseapp.com",
        databaseURL: "https://aviator-f562e-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "aviator-f562e",
        storageBucket: "aviator-f562e.firebasestorage.app",
        messagingSenderId: "649327828612",
        appId: "1:649327828612:web:f599fb22598002b6016cd1",
        measurementId: "G-RHZ13ET692"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('sendBtn').addEventListener('click', () => {
        const title = document.getElementById('title').value;
        const message = document.getElementById('message').value;
        const statusMsg = document.getElementById('statusMsg');

        if(!title || !message) {
            alert('Please fill out both fields!');
            return;
        }

        // Target document inside Cloud Firestore system collection paths
        const docRef = doc(db, "system", "current_notification");

        setDoc(docRef, {
            title: title,
            message: message,
            timestamp: Date.now()
        })
        .then(() => {
            statusMsg.style.color = "#00ff66";
            statusMsg.style.textShadow = "0 0 5px #00ff66";
            statusMsg.innerText = "⚡ Neon Alert Published to Firestore!";
            
            document.getElementById('title').value = '';
            document.getElementById('message').value = '';
            
            setTimeout(() => statusMsg.innerText = "", 3000);
        })
        .catch((error) => {
            statusMsg.style.color = "#ff0033";
            statusMsg.style.textShadow = "0 0 5px #ff0033";
            statusMsg.innerText = "Error: " + error.message;
        });
    });
</script>
</body>
</html>
