<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Payout Pipeline Verification</title>
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-admin: #0a0203;
            --neon-blue: #ef4444; /* Remapped to neon red glow */
            --neon-red: #ff0037;
            --success-green: #10b981;
            --card-dark: rgba(22, 10, 11, 0.85);
            --border-premium: rgba(239, 68, 68, 0.18);
            --text-light: #ffffff;
            --text-dim: #fca5a5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-admin);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(255, 0, 55, 0.15) 0%, transparent 60%),
                radial-gradient(circle at 50% 90%, rgba(153, 27, 27, 0.15) 0%, transparent 60%);
            background-attachment: fixed;
            color: var(--text-light);
            padding: 20px 16px;
            min-height: 100vh;
            padding-bottom: 100px; /* Cushion space for pinned bottom navigation */
        }

        /* --- OVERALL APP CONTAINER --- */
        .app-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        /* --- SMARTPHONE NAVIGATION HEADER --- */
        .admin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-premium);
            padding-bottom: 16px;
            margin-bottom: 24px;
        }

        .header-left-group {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .btn-back-link {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid var(--border-premium);
            color: var(--text-light);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn-back-link:active {
            background: rgba(239, 68, 68, 0.2);
        }

        .admin-title {
            font-size: 1.25rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #ffffff;
            font-weight: 800;
            text-shadow: 0 0 20px rgba(255, 0, 55, 0.2);
        }

        .admin-title span {
            color: var(--neon-red);
        }

        /* --- QUEUE LAYOUT DESIGNS --- */
        .queue-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .payout-card {
            background: var(--card-dark);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-premium);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            box-shadow: 0 4px 25px rgba(0,0,0,0.4);
        }

        .card-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .user-meta {
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.4;
        }

        .user-email {
            color: #ffffff;
            font-weight: 600;
            display: block;
            margin-top: 2px;
        }

        .payout-amount {
            font-size: 1.35rem;
            font-weight: 900;
            color: var(--text-light);
            text-shadow: 0 0 10px rgba(255, 0, 55, 0.3);
        }

        .payment-details-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(239, 68, 68, 0.08);
            border-radius: 10px;
            padding: 12px;
            font-size: 0.85rem;
            color: #fca5a5;
            line-height: 1.5;
            word-break: break-word;
        }

        .details-label {
            color: var(--neon-red);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
            display: block;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .action-row {
            display: flex;
            gap: 10px;
            margin-top: 4px;
        }

        .btn-admin {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.8rem;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: opacity 0.2s;
        }

        .btn-admin:active {
            opacity: 0.8;
        }

        .btn-approve {
            background: var(--success-green);
            color: #000000;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        .btn-reject {
            background: rgba(255, 0, 55, 0.1);
            color: var(--neon-red);
            border: 1px solid rgba(255, 0, 55, 0.3);
        }

        .no-data {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-dim);
            font-size: 0.9rem;
            border: 1px dashed var(--border-premium);
            border-radius: 16px;
            background: var(--card-dark);
            backdrop-filter: blur(16px);
        }

        /* --- PINNED BOTTOM NAVIGATION BAR --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(12, 4, 5, 0.94);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-premium);
            padding: 10px 16px 14px 16px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 999;
            box-shadow: 0 -8px 25px rgba(0,0,0,0.8);
        }

        .bottom-nav-item, .bottom-nav-logout-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: color 0.2s;
        }

        .bottom-nav-item i, .bottom-nav-logout-btn i { 
            font-size: 18px; 
            opacity: 0.75;
        }
        
        .bottom-nav-item.active { color: var(--neon-red); }
        .bottom-nav-item.active i { opacity: 1; filter: drop-shadow(0 0 6px var(--neon-red)); }
        
        .bottom-nav-logout-btn { color: #f43f5e; }
        .bottom-nav-logout-btn i { opacity: 1; }

        /* --- CONFIRMATION DIALOG MODAL --- */
        .logout-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(5, 1, 2, 0.85);
            backdrop-filter: blur(8px);
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            padding: 16px;
        }

        .logout-modal-overlay.active { opacity: 1; pointer-events: auto; }

        .logout-modal {
            background: #140608;
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 340px;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.25s ease;
        }

        .logout-modal-overlay.active .logout-modal { transform: scale(1); }
        .logout-icon-box { width: 54px; height: 54px; background: rgba(239, 68, 68, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px auto; color: #ef4444; font-size: 20px; border: 1px solid rgba(239,68,68,0.2); }
        .logout-modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
        .logout-modal p { color: var(--text-dim); font-size: 13px; margin-bottom: 20px; }
        
        .modal-buttons { display: flex; gap: 10px; }
        .btn-modal { flex: 1; padding: 12px; border-radius: 10px; font-weight: 600; font-size: 13px; cursor: pointer; border: none; }
        .btn-cancel { background: rgba(255,255,255,0.06); color: white; border: 1px solid rgba(255,255,255,0.08); }
        .btn-confirm-logout { background: #ef4444; color: white; }
    </style>
</head>
<body>

    <!-- LOGOUT MODAL OVERLAY -->
    <div class="logout-modal-overlay" id="logoutModalOverlay">
        <div class="logout-modal">
            <div class="logout-icon-box"><i class="fa-solid fa-triangle-exclamation"></i></div>
            <h3>Confirm Logout</h3>
            <p>Are you sure you want to exit the admin station?</p>
            <div class="modal-buttons">
                <button class="btn-modal btn-cancel" onclick="closeLogoutModal()">Cancel</button>
                <button class="btn-modal btn-confirm-logout" onclick="executeLogout()">Confirm</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP CONTAINER WRAPPER -->
    <div class="app-container">

        <header class="admin-header">
            <div class="header-left-group">
                <!-- Mobile Screen Contextual Back Button Anchor -->
                <a href="adminhome.html" class="btn-back-link">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <h1 class="admin-title">Payout <span>Pipeline</span></h1>
            </div>
        </header>

        <main class="queue-container" id="adminQueueContainer">
            <div class="no-data">Connecting to secure transaction logs...</div>
        </main>

    </div>

    <!-- STICKY BOTTOM SCREEN NAVIGATION CORES -->
    <nav class="bottom-nav">
        <a href="adminhome.html" class="bottom-nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a href="deposit.html" class="bottom-nav-item">
            <i class="fa-solid fa-wallet"></i>
            <span>Deposit</span>
        </a>
        <a href="#" class="bottom-nav-item active">
            <i class="fa-solid fa-money-bill-transfer"></i>
            <span>Payout</span>
        </a>
        <button class="bottom-nav-logout-btn" onclick="openLogoutModal()">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span>Exit</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, runTransaction, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDrAocFm8fnX2hJg2TyKQbmNe65C8ta4OA",
            authDomain: "aviator-f562e.firebaseapp.com",
            databaseURL: "https://aviator-f562e-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aviator-f562e",
            storageBucket: "aviator-f562e.firebasestorage.app",
            messagingSenderId: "649327828612",
            appId: "1:649327828612:web:f599fb22598002b6016cd1",
            measurementId: "G-RHZ13ET692"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const queueContainer = document.getElementById('adminQueueContainer');

        // Real-time listener for incoming layout requests configured as "pending"
        const q = query(collection(db, "withdrawals"), where("status", "==", "pending"));

        onSnapshot(q, (snapshot) => {
            queueContainer.innerHTML = "";

            if (snapshot.empty) {
                queueContainer.innerHTML = `<div class="no-data">Operational processing queue empty. No pending adjustments found.</div>`;
                return;
            }

            snapshot.forEach((snapshotDoc) => {
                const req = snapshotDoc.data();
                const card = document.createElement('div');
                card.className = 'payout-card';

                card.innerHTML = `
                    <div class="card-row">
                        <span class="user-meta">
                            ID: <code>${req.uid.substring(0, 10)}...</code>
                            <span class="user-email">${req.email}</span>
                        </span>
                        <span class="payout-amount">₹${parseFloat(req.amount).toFixed(2)}</span>
                    </div>
                    <div class="payment-details-box">
                        <span class="details-label">Destination Credentials</span>
                        ${req.details}
                    </div>
                    <div class="action-row">
                        <button class="btn-admin btn-reject" data-txid="${req.txid}" data-uid="${req.uid}">Reject</button>
                        <button class="btn-admin btn-approve" data-txid="${req.txid}" data-uid="${req.uid}" data-amount="${req.amount}">Approve Clear</button>
                    </div>
                `;

                // Add button listeners
                card.querySelector('.btn-approve').addEventListener('click', (e) => {
                    processApproval(e.target.dataset.uid, e.target.dataset.txid, parseFloat(e.target.dataset.amount));
                });

                card.querySelector('.btn-reject').addEventListener('click', (e) => {
                    processRejection(e.target.dataset.uid, e.target.dataset.txid);
                });

                queueContainer.appendChild(card);
            });
        });

        // Atomic Transaction to shift Status seamlessly to "success" inside user transaction logs
        async function processApproval(uid, txid, amount) {
            if (!confirm(`Approve payout clearance request of ₹${amount}? This process scales your database balances instantly.`)) return;

            const userDocRef = doc(db, "users", uid);
            const adminTxRef = doc(db, "withdrawals", txid);
            const userHistoryRef = doc(db, "users", uid, "history", txid);

            try {
                await runTransaction(db, async (transaction) => {
                    const userSnap = await transaction.get(userDocRef);
                    if (!userSnap.exists()) throw "User document entry absent.";

                    const currentBalance = parseFloat(userSnap.data().balance || 0);
                    if (currentBalance < amount) throw "User spent assets before clearance. Transaction aborted.";

                    // Subtract the asset value from user's live balance ledger
                    const adjustedBalance = currentBalance - amount;

                    // Concurrent Execution Updates
                    transaction.update(userDocRef, { balance: adjustedBalance });
                    transaction.update(adminTxRef, { status: "success" });
                    transaction.update(userHistoryRef, { status: "success" });
                });

                alert("Successfully cleared! Transaction logs reflect 'success' parameters.");
            } catch (err) {
                console.error("Execution Node process failure: ", err);
                alert("Execution rejected: " + err);
            }
        }

        async function processRejection(uid, txid) {
            if (!confirm("Deny execution processing for this transaction profile?")) return;

            const adminTxRef = doc(db, "withdrawals", txid);
            const userHistoryRef = doc(db, "users", uid, "history", txid);

            try {
                await updateDoc(adminTxRef, { status: "rejected" });
                await updateDoc(userHistoryRef, { status: "rejected" });
                alert("Request status modified to rejected.");
            } catch (err) {
                console.error("Rejection step failure: ", err);
            }
        }
    </script>

    <!-- OVERLAY CONTROLLERS -->
    <script>
        function openLogoutModal() { document.getElementById('logoutModalOverlay').classList.add('active'); }
        function closeLogoutModal() { document.getElementById('logoutModalOverlay').classList.remove('active'); }
        function executeLogout() { window.location.href = "../login.html"; }
    </script>
</body>
</html>
